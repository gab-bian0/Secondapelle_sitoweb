<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagina non trovata – Seconda Pelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --marrone:    #5c3d2e;
      --ocra:       #c8a84b;
      --ocra-light: #e8d49a;
      --lotus:      #d4a5a5;
      --lotus-soft: #f5ece8;
      --crema:      #faf6f0;
      --bianco:     #ffffff;
      --testo:      #3a2a1e;
      --testo-soft: #7a6555;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--crema);
      color: var(--testo);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Sfondo decorativo */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(200,168,75,.12) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(212,165,165,.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(92,61,46,.06) 0%, transparent 40%);
    }

    /* Numero 404 gigante in background */
    .bg-number {
      position: fixed;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(200px, 40vw, 420px);
      font-weight: 600;
      color: transparent;
      -webkit-text-stroke: 1px rgba(200,168,75,.15);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      z-index: 0;
      letter-spacing: -.02em;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    /* Contenuto centrale */
    .content {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 560px;
      animation: fadeUp .9s ease both;
    }

    .badge {
      display: inline-block;
      font-size: .7rem; font-weight: 500; letter-spacing: .25em; text-transform: uppercase;
      color: var(--ocra);
      border: 1px solid var(--ocra-light);
      padding: 6px 18px; border-radius: 20px;
      margin-bottom: 32px;
      background: rgba(255,255,255,.6);
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 300;
      color: var(--marrone);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .title em {
      font-style: italic;
      color: var(--ocra);
    }

    .divider {
      width: 48px; height: 2px;
      background: var(--ocra);
      margin: 24px auto;
    }

    .message {
      font-size: 1rem; font-weight: 300;
      color: var(--testo-soft);
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 13px 30px;
      font-family: 'Jost', sans-serif;
      font-size: .8rem; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase;
      text-decoration: none; border-radius: 2px;
      transition: all .3s;
    }
    .btn-primary {
      background: var(--marrone); color: var(--bianco);
    }
    .btn-primary:hover {
      background: var(--ocra); color: var(--marrone);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(92,61,46,.2);
    }
    .btn-secondary {
      background: transparent; color: var(--marrone);
      border: 1px solid var(--ocra-light);
    }
    .btn-secondary:hover {
      border-color: var(--ocra);
      transform: translateY(-2px);
    }

    /* Link rapidi */
    .quick-links {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--ocra-light);
    }
    .quick-links p {
      font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--testo-soft); margin-bottom: 16px;
    }
    .quick-nav {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    }
    .quick-nav a {
      font-size: .85rem; color: var(--marrone);
      text-decoration: none; font-weight: 500;
      transition: color .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .quick-nav a:hover { color: var(--ocra); }

    /* Footer minimo */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      text-align: center; padding: 16px;
      font-size: .72rem; color: var(--testo-soft);
      letter-spacing: .08em;
    }
    footer a { color: var(--marrone); text-decoration: none; }
    footer a:hover { color: var(--ocra); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 480px) {
      .actions { flex-direction: column; align-items: center; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="bg-number">404</div>

  <div class="content">
    <span class="badge">Pagina non trovata</span>

    <h1 class="title">
      Questa pagina<br>non <em>esiste</em>
    </h1>

    <div class="divider"></div>

    <p class="message">
      La pagina che stai cercando potrebbe essere stata<br>
      spostata, eliminata o l'indirizzo potrebbe contenere un errore.
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">← Torna alla home</a>
      <a href="index.html#orari" class="btn btn-secondary">Contattaci</a>
    </div>

    <div class="quick-links">
      <p>Oppure esplora</p>
      <div class="quick-nav">
        <a href="index.html#novita">✨ Novità</a>
        <a href="index.html#prodotti">📦 Prodotti</a>
        <a href="index.html#orari">🕐 Orari</a>
        <a href="index.html#orari">📍 Contatti</a>
      </div>
    </div>
  </div>

  <footer>
    <a href="index.html">Seconda Pelle</a> &nbsp;·&nbsp; Santerno Relax Store
  </footer>

</body>
</html>
